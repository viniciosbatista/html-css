<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>tabelas</title>
</head>
<body>
    <table>
        <caption>ola</caption>

            <tr>
                <th scope="row">GRUPOS</th>
                <th scope="col">NOMES</th>

            </tr>

                <tr>
                    <th scope="rowgroup" rowspan="3">MULHERES</th>
                    <td>ana maria santos</td>
                    <td>alien</td>
                    <td>rambo</td>
                    <td>vingadores</td>
                </tr>
                <tr>
                    <td>beatriz souza </td>
                    <td>hulk</td>
                    <td>inception</td>
                    <td>batman</td>
                </tr>
                <tr>
                    <td>claudia melo</td>
                    <td>oblivion</td>
                    <td>matrix</td>
                    <td>big hero</td>
                </tr>
                <tr>
                    <th rowspan="3" scope="rowgroup">HOMENS</th>
                    <td>bruno mendoça</td>
                    <td>intocaveis</td>
                    <td>amnesia</td>
                    <td>gladiador</td>
                </tr>
                <tr>
                    <td>daniel lourenço</td>
                    <td>wall-e</td>
                    <td>oldboy</td>
                    <td>dangal</td>
                </tr>
                <tr>
                    <td>fabiano mota</td>
                    <td>star wars 5</td>
                    <td>taxi drive</td>
                    <td>toy story</td>
                </tr>
            </tbody>
    </table>
</body>
</html>
