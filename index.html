<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>teste de formulario</h1>
    <form autocomplete="on" method="post">
        <fieldset>
            <legend>dado pessoais</legend>
            <p>
                <label for="nome">nome</label>
                <input type="text" name="nome" id="nome" required autocomplete="name" placeholder="nome" value="maria">
            </p>
            <p>
                <label for="media">media</label>
                <input type="number" name="media" id="media" required min="0" max="10" placeholder=" 0 a 10" step="0.1" value="5">
            </p>
            <p>
                <label for="mes">periodo letivo</label>
                <input type="month" name="mes" id="mes" required value="1999-05" >
            </p>
            <p>
                <label for="dia">dia da prova</label>
                <input type="date" name="dia" id="dia" required value="1999-05-09">
            </p>
            <p>
                <label for="hora">hora da prova</label>
                <input type="time" name="hora" id="hora" required value="00:00">
            </p>
            <p>
                <label for="email">email</label>
                <input type="email" name="email" id="email" required placeholder="email">
            </p>
            <p>
                <label for="telefone">telefone</label>
                <input type="tel" name="telefone" id="telefone" required placeholder="numero de telefone">
            </p>
            <p>
                <label for="cor">cor</label>
                <input type="color" name="cor" id="cor" required>
            </p>
            <p>
                <label for="nivel">nivel de satisfaçao</label>
                <input type="range" name="nivel" id="nivel" min="0" max="10" value="5">
            </p>
            <p>
                <label for="foto">foto</label>
                <input type="file" name="foto" id="foto">
            </p>
            <p>
                <input type="submit" value="enviar">
                <input type="reset" value="limpar">
            </p>
        </fieldset>
        <fieldset>
            <legend>esportes</legend>
            <p>
                <input type="checkbox" name="futebol" id="futebol"><label for="futebol">futebol</label>
                <input type="checkbox" name="futebol" id="muay thai" checked><label for="muay thai">muay thai</label>
                
            </p>
        </fieldset>
        <fieldset>
            <legend>sexo</legend>
            <p>
                <input type="radio" name="sexo" id="mas" checked>
                <label for="mas">masculino</label>
                <input type="radio" name="sexo" id="fem">
                <label for="fem">feminino</label>
            </p>
        </fieldset>
        <fieldset>
                <legend>cidades</legend>
                <p>
                    <label for="estados">estados</label>
                    <select name="estados" id="estados">
                        <option value="" selected>--escolha--</option>
                        <optgroup label="regiao sudeste">
                            <option value="mg">minas gerais</option>
                            <option value="rj">rio de janeiro</option>
                            <option value="sp">sao paulo</option>
                        </optgroup>
                        <optgroup label="regiao nordeste">
                            <option value="ma">maranhao</option>
                            <option value="pe">pernanbuco</option>
                            <option value="rn">rio grande do morte</option>
                        </optgroup>
                    </select>
                </p>
                <p>
                    <label for="iprof">profisao</label>
                    <input type="text" name="prof" id="iprof" list="istprof">
                    <datalist id="istprof">
                        <option>administrador</option>
                        <option>programador</option>
                        <option>professor</option>
                        <option>contabilista</option>
                    </datalist>
                </p>
                <p>
                    <label for="msg">mensagen:</label> <br>
                    <textarea name="msg" id="msg" cols="30" rows="10"></textarea>
                </p>
        </fieldset>
       
        
    </form>
</body>
</html>
